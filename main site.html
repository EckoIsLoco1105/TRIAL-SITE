<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Quest Board</title>
    <link rel="stylesheet" href="main css.css">
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica+SC&display=swap" rel="stylesheet">
</head>
<body>

    <div class="modal-overlay" id="pin-setup-modal" style="display:none;">
        <div class="modal-content">
            <h2>Set Admin Pin</h2>
            <p>Create a pin to manage this board.</p>
            <input type="password" id="new-pin" placeholder="Enter New Pin">
            <button class="btn-submit" onclick="setInitialPin()">Save Pin</button>
        </div>
    </div>

    <div class="quest-board-container">
        <header class="board-header">
            <div class="title-group">
                <h1>Quest Board</h1>
                <p><span id="active-count">0</span> active • <span id="completed-count">0</span> completed</p>
            </div>
            <button class="post-quest-btn" onclick="requestAccess('post')">
                <span>⊕</span> Post New Quest
            </button>
        </header>

        <main class="quest-board-panel" id="quest-container"></main>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2>Post New Quest</h2>
            <div class="input-group">
                <label>Quest Name</label>
                <input type="text" id="quest-name">
            </div>
            <div class="input-group">
                <label>Instructions</label>
                <textarea id="quest-instructions"></textarea>
            </div>
            <div class="input-group">
                <label>Reward</label>
                <input type="text" id="quest-reward">
            </div>
            <div class="input-group">
            <label>Time Limit</label>
                <div style="display: flex; gap: 5px;">
                 <input type="number" id="quest-hours" placeholder="HH" min="0" style="width: 33%;">
                 <input type="number" id="quest-mins" placeholder="MM" min="0" max="59" style="width: 33%;">
                <input type="number" id="quest-secs" placeholder="SS" min="0" max="59" style="width: 33%;">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="toggleModal(false)">Cancel</button>
                <button class="btn-submit" onclick="addQuest()">Post Quest</button>
            </div>
        </div>
    </div>

    

    <script src="main java.js"></script>
</body>
</html>
